<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Admin Form</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container">
    <h2>Update Portfolio Details</h2>

    <form id="dataForm" enctype="multipart/form-data">

      <fieldset>
        <legend>Personal Information</legend>

        <label>Full Name</label>
        <input type="text" name="name">

        <label>Role / Title</label>
        <input type="text" name="role">

        <label>Email</label>
        <input type="email" name="email">

        <label>WhatsApp link</label>
        <input type="url" name="whatsapp">

        <label>Github link</label>
        <input type="url" name="github">

        <label>About You</label>
        <textarea name="about" rows="4"></textarea>

        <label>Upload CV (PDF)</label>
        <input type="file" name="cv" accept=".pdf">

        <label>Upload Avatar (Image)</label>
        <input type="file" name="avatar" accept="image/*">
      </fieldset>

      <fieldset>
        <legend>Skills</legend>

        <label>Frontend (comma separated)</label>
        <input type="text" name="frontend" placeholder="HTML, CSS, JavaScript, Laravel">

        <label>Backend (comma separated)</label>
        <input type="text" name="backend" placeholder="PHP, Node.js, Express, MongoDB">

        <label>Tools (comma separated)</label>
        <input type="text" name="tools" placeholder="Github, VS Code, Figma">
      </fieldset>

      <fieldset id="projects-fieldset">
        <legend>Project Details</legend>

        <div id="projects-container">
        </div>

        <button type="button" id="add-project-btn" class="btn secondary">+ Add Project</button>
      </fieldset>

      <fieldset id="work-fieldset">
        <legend>Work Experience</legend>

        <div id="work-container">
        </div>

        <button type="button" id="add-work-btn" class="btn secondary">+ Add Work Experience</button>
      </fieldset>

      <button type="submit" class="btn primary">Save Portfolio</button>

    </form>
  </div>

  <script src="script.js"></script>
  <script>document.getElementById('add-project-btn').addEventListener('click', function () {
      const newDiv = document.createElement('div');
      newDiv.classList.add('project');

      const titleLabel = document.createElement('label');
      titleLabel.textContent = 'Title:';
      const titleInput = document.createElement('input');
      titleInput.type = 'text';
      titleInput.placeholder = 'Enter project title';
      titleInput.name = 'title';

      const descriptionLabel = document.createElement('label');
      descriptionLabel.textContent = 'Description:';
      const descriptionInput = document.createElement('textarea');
      descriptionInput.placeholder = 'Enter project description';
      descriptionInput.name = 'description';

      const gitLabel = document.createElement('label');
      gitLabel.textContent = 'GitLink:';
      const gitLinkInput = document.createElement('input');
      gitLinkInput.type = 'url';
      gitLinkInput.placeholder = 'Enter GitHub repository URL';
      gitLinkInput.name = 'gitlink';

      const liveLabel = document.createElement('label');
      liveLabel.textContent = 'Live Link:';
      const liveLinkInput = document.createElement('input');
      liveLinkInput.placeholder = 'Enter live demo link';
      liveLinkInput.name = 'livelink';

      const removeBtn = document.createElement('button');
      removeBtn.textContent = 'Remove Project';
      removeBtn.classList.add('remove-btn');
      removeBtn.addEventListener('click', function () {
        newDiv.remove();
      });

      newDiv.appendChild(titleLabel);
      newDiv.appendChild(titleInput);
      newDiv.appendChild(descriptionLabel);
      newDiv.appendChild(descriptionInput);
      newDiv.appendChild(gitLabel);
      newDiv.appendChild(gitLinkInput);
      newDiv.appendChild(liveLabel);
      newDiv.appendChild(liveLinkInput);
      newDiv.appendChild(removeBtn);

      const projectContainer = document.getElementById('projects-container');
      projectContainer.appendChild(newDiv);
    });

    document.getElementById('add-work-btn').addEventListener('click', function () {
      const newDiv = document.createElement('div');
      newDiv.classList.add('work');

      const companyLabel = document.createElement('label');
      companyLabel.textContent = 'Company:';
      const companyInput = document.createElement('input');
      companyInput.type = 'text';
      companyInput.placeholder = 'Enter company name';
      companyInput.name = 'company';

      const positionLabel = document.createElement('label');
      positionLabel.textContent = 'Position:';
      const positionInput = document.createElement('input');
      positionInput.type = 'text';
      positionInput.placeholder = 'Enter your position/title';
      positionInput.name = 'position';

      const startDateLabel = document.createElement('label');
      startDateLabel.textContent = 'Start Date:';
      const startDateInput = document.createElement('input');
      startDateInput.type = 'month';
      startDateInput.name = 'start_date';

      const endDateLabel = document.createElement('label');
      endDateLabel.textContent = 'End Date:';
      const endDateInput = document.createElement('input');
      endDateInput.type = 'month';
      endDateInput.name = 'end_date';

      const currentLabel = document.createElement('label');
      currentLabel.textContent = 'Currently Working:';
      const currentInput = document.createElement('input');
      currentInput.type = 'checkbox';
      currentInput.name = 'current';

      const descriptionLabel = document.createElement('label');
      descriptionLabel.textContent = 'Description:';
      const descriptionInput = document.createElement('textarea');
      descriptionInput.placeholder = 'Enter job description and responsibilities';
      descriptionInput.name = 'work_description';

      const removeBtn = document.createElement('button');
      removeBtn.textContent = 'Remove Work Experience';
      removeBtn.classList.add('remove-btn');
      removeBtn.addEventListener('click', function () {
        newDiv.remove();
      });

      newDiv.appendChild(companyLabel);
      newDiv.appendChild(companyInput);
      newDiv.appendChild(positionLabel);
      newDiv.appendChild(positionInput);
      newDiv.appendChild(startDateLabel);
      newDiv.appendChild(startDateInput);
      newDiv.appendChild(endDateLabel);
      newDiv.appendChild(endDateInput);
      newDiv.appendChild(currentLabel);
      newDiv.appendChild(currentInput);
      newDiv.appendChild(descriptionLabel);
      newDiv.appendChild(descriptionInput);
      newDiv.appendChild(removeBtn);

      const workContainer = document.getElementById('work-container');
      workContainer.appendChild(newDiv);
    });</script>
</body>

</html>
